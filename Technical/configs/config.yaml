# Visualization settings
visualization:
  dpi: 300
  style: seaborn-v0_8-whitegrid
  figsize_default: [12, 8]
  color_palette: colorblind

# Pipeline framework configuration
pipeline:
  default_timeout: 120
  max_parallel_workers: 4
  strict_validation: false
  stages:
    L: {parallel: true, timeout: 300, skippable: true}
    P: {parallel: true, timeout: 300}
    E: {parallel: true, timeout: 60}
    A: {parallel: true, timeout: 120}
    V: {parallel: true, timeout: 120}
    R: {parallel: false, timeout: 300}
