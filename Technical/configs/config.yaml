# Gerhard - Global Public Finance Analysis Platform
# Central configuration file
project:
  name: Gerhard
  version: 2.0.0
  description: Global Public Finance Analysis Platform

# All paths are relative to project root (resolved at runtime)
paths:
  output_data: Output/Data
  output_pdfs: Output/PDFs
  technical_data: Technical/data
  raw_data: Technical/data/raw
  processed_data: Technical/data/processed
  countries: Countries
  docs: Technical/docs
  configs: Technical/configs

# Data source configuration
data_sources:
  worldbank:
    enabled: true
    indicator: GC.TAX.TOTL.GD.ZS
    raw_dir: Technical/data/raw/worldbank
  imf:
    enabled: true
    raw_dir: Technical/data/raw/imf
    note: May require manual download from IMF DataMapper
  oecd:
    enabled: true
    raw_dir: Technical/data/raw/oecd
    note: May require manual download from OECD.Stat
  eurostat:
    enabled: true
    raw_dir: Technical/data/raw/eurostat
  wid:
    enabled: true
    raw_dir: Technical/data/raw/wid
  us_dina:
    enabled: true
    raw_dir: Technical/data/raw/us_dina

